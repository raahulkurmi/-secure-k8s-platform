name: CI — Secure K8s Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  lint-validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: app/backend/Dockerfile
          failure-threshold: error

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: app/frontend/Dockerfile
          failure-threshold: error

      - name: Validate K8s Manifests
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin
          kubeconform -strict -summary -skip ClusterPolicy k8s/base/ k8s/policies/

  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: lint-validate
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Trivy — Scan filesystem
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: v1.11.0

      - name: Kyverno policy checks
        run: |
          kyverno apply k8s/policies/kyverno-policies.yaml \
            --resource k8s/base/kubernetes_spec.yaml \
            --detailed-results

  build-scan:
    name: 🐳 Build & Scan Images
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend metadata
        id: meta-backend
        uses: docker/metadata-action@902fa8ec7d6ecbea8a64d1257b66e6cf29a9a9cf # v5.7.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/secure-todo-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build backend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: app/backend
          push: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy — Scan backend image
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/secure-todo-backend:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Push backend
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: app/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha

      - name: Frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@902fa8ec7d6ecbea8a64d1257b66e6cf29a9a9cf # v5.7.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/secure-todo-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build frontend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: app/frontend
          push: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy — Scan frontend image
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.28.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/secure-todo-frontend:latest
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Push frontend
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: app/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha

  deploy:
    name: 📝 Update Image Tags
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tags in manifests
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|secure-todo-backend:.*|${{ env.IMAGE_PREFIX }}/secure-todo-backend:${SHA}|g" k8s/base/kubernetes_spec.yaml
          sed -i "s|secure-todo-frontend:.*|${{ env.IMAGE_PREFIX }}/secure-todo-frontend:${SHA}|g" k8s/base/kubernetes_spec.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kubernetes_spec.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
